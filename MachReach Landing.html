/* ============ MachReach JR landing — design tokens ============ */

:root {
  /* type */
  --font-display: "Bricolage Grotesque", sans-serif;
  --font-body: "Nunito", sans-serif;
  --font-mono: "Nunito", sans-serif;

  /* base — light theme by default */
  --bg: oklch(0.985 0.005 80);
  --bg-2: oklch(0.96 0.01 80);
  --surface: #ffffff;
  --ink: oklch(0.18 0.02 270);
  --ink-2: oklch(0.42 0.02 270);
  --ink-3: oklch(0.62 0.02 270);
  --line: oklch(0.88 0.01 80);
  --line-2: oklch(0.78 0.01 80);

  /* brand — coral default */
  --brand: oklch(0.73 0.22 38);
  --brand-ink: oklch(0.34 0.12 38);
  --brand-soft: oklch(0.94 0.075 38);
  --accent: oklch(0.84 0.19 130);
  --accent-ink: oklch(0.30 0.10 130);
  --secondary: oklch(0.74 0.17 58);
  --secondary-soft: oklch(0.95 0.055 58);

  /* semantic */
  --gold: oklch(0.84 0.16 85);
  --silver: oklch(0.78 0.02 250);
  --bronze: oklch(0.68 0.12 50);
  --good: oklch(0.72 0.16 155);
  --bad: oklch(0.65 0.20 25);

  /* layout */
  --radius-sm: 10px;
  --radius: 18px;
  --radius-lg: 28px;
  --radius-xl: 36px;
  --shadow-sm: 0 2px 0 0 var(--ink);
  --shadow:    0 4px 0 0 var(--ink);
  --shadow-lg: 0 6px 0 0 var(--ink);

  --container: 1200px;
}

[data-theme="dark"] {
  --bg: oklch(0.16 0.02 270);
  --bg-2: oklch(0.20 0.02 270);
  --surface: oklch(0.22 0.02 270);
  --ink: oklch(0.97 0.01 80);
  --ink-2: oklch(0.78 0.02 270);
  --ink-3: oklch(0.60 0.02 270);
  --line: oklch(0.32 0.02 270);
  --line-2: oklch(0.42 0.02 270);
  --brand-soft: oklch(0.30 0.09 38);
  --secondary-soft: oklch(0.30 0.06 290);
}

[data-accent="lime"]   { --brand: oklch(0.84 0.18 130); --brand-ink: oklch(0.32 0.10 130); --brand-soft: oklch(0.95 0.07 130); }
[data-accent="violet"] { --brand: oklch(0.66 0.20 290); --brand-ink: oklch(0.30 0.12 290); --brand-soft: oklch(0.94 0.05 290); }
[data-accent="sky"]    { --brand: oklch(0.74 0.15 240); --brand-ink: oklch(0.32 0.10 240); --brand-soft: oklch(0.95 0.05 240); }
[data-accent="coral"]  { --brand: oklch(0.73 0.22 38);  --brand-ink: oklch(0.34 0.12 38);  --brand-soft: oklch(0.94 0.075 38); }

/* ============ reset ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: clip; max-width: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 17px;
  line-height: 1.55;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  text-wrap: pretty;
  overflow-x: clip;
  max-width: 100%;
}
img, svg { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; }

/* ============ utilities ============ */
.container { width: 100%; max-width: var(--container); margin: 0 auto; padding: 0 24px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--brand-ink);
  background: var(--brand-soft);
  padding: 8px 14px; border-radius: 999px;
  border: 2px solid var(--brand);
}
.eyebrow .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--brand); }

/* button system */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  font-family: var(--font-display); font-weight: 800; font-size: 17px;
  padding: 14px 26px;
  border-radius: 16px;
  border: 2px solid var(--ink);
  transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
  white-space: nowrap;
}
.btn-primary { background: var(--brand); color: white; box-shadow: var(--shadow); }
.btn-primary:hover { transform: translate(-1px, -1px); box-shadow: 0 5px 0 0 var(--ink); }
.btn-primary:active { transform: translate(0, 4px); box-shadow: 0 0 0 0 var(--ink); }
.btn-ghost { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
.btn-ghost:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow); background: var(--bg-2); }
.btn-lg { font-size: 19px; padding: 18px 32px; border-radius: 18px; }
.btn-sm { font-size: 14px; padding: 8px 16px; border-radius: 12px; }

/* card */
.card {
  background: var(--surface);
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
}
.card-soft {
  background: var(--surface);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
}

/* section */
section { padding: 96px 0; }
.section-head { text-align: center; max-width: 780px; margin: 0 auto 56px; }
.section-head h2 { font-size: clamp(34px, 5vw, 56px); margin-top: 14px; }
.section-head p { color: var(--ink-2); font-size: 19px; margin-top: 16px; }

/* nav */
.nav {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(14px);
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  border-bottom: 2px solid var(--line);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
.nav-links { display: flex; align-items: center; gap: 28px; }
.nav-links a { font-weight: 700; font-size: 15px; color: var(--ink-2); }
.nav-links a:hover { color: var(--ink); }

/* logo */
.logo { display: inline-flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 36px; height: 36px;
  display: grid; place-items: center;
}
.logo-mark img { width: 100%; height: 100%; display: block; }
.logo-text { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
.logo-text .dot { color: var(--brand); }

/* footer */
footer { padding: 64px 0 40px; border-top: 2px solid var(--line); margin-top: 64px; }

/* small bits */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 999px;
  background: var(--bg-2); border: 1.5px solid var(--line);
  color: var(--ink-2);
  text-transform: uppercase; letter-spacing: 0.08em;
}

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--brand) 50%, transparent); }
  70%  { box-shadow: 0 0 0 12px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
@keyframes count-up { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.fade-up { animation: count-up .5s ease both; }

/* ============ landing motion layer ============ */
:root {
  --landing-mx: .5;
  --landing-my: .5;
  --landing-dx: 0px;
  --landing-dy: 0px;
  --landing-scroll-pct: 0%;
}
#landing-progress {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  z-index: 1000;
  pointer-events: none;
  overflow: visible;
  background: color-mix(in oklab, var(--surface) 52%, transparent);
}
#landing-progress-bar {
  display: block;
  width: 100%;
  height: 100%;
  transform: scaleX(0);
  transform-origin: left center;
  background: linear-gradient(90deg, var(--gold), var(--brand), #FF7A3D);
  box-shadow: 0 0 18px color-mix(in oklab, var(--brand) 40%, transparent);
}
/* the streak flame riding the tip of the progress bar */
#landing-progress-flame {
  position: absolute;
  top: -8px;
  left: var(--landing-scroll-pct, 0%);
  width: 22px;
  height: 22px;
  margin-left: -11px;
  display: block;
  filter: drop-shadow(0 0 7px color-mix(in oklab, #FF7A3D 65%, transparent));
  animation: motion-flame-wiggle .85s ease-in-out infinite alternate;
  transform-origin: 50% 88%;
}
/* ruled notebook paper, drifting slowly like a page sliding under the content */
.landing-edge-pattern {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: .11;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 31px, color-mix(in oklab, var(--ink) 22%, transparent) 31px 33px),
    linear-gradient(90deg, transparent 0 84px, color-mix(in oklab, var(--bad) 55%, transparent) 84px 86px, transparent 86px);
  background-size: 100% 33px, 100% 100%;
  mask-image: linear-gradient(to bottom, black 0%, black 70%, transparent 100%);
  animation: motion-paper-drift 36s linear infinite;
  transform: translate3d(var(--landing-dx), var(--landing-dy), 0);
  transition: transform .28s ease;
  will-change: transform, background-position;
}
.nav,
section,
footer {
  position: relative;
  z-index: 1;
}
section {
  overflow: visible;
}
.hero-grid,
.price-grid,
.lb-wrap,
.canvas-cta,
.quiz-wrap {
  max-width: 100%;
}

/* dashed pencil divider drawn along the bottom of the live section */
section::after {
  content: "";
  position: absolute;
  left: clamp(24px, 6vw, 90px);
  right: clamp(24px, 6vw, 90px);
  bottom: 0;
  height: 0;
  pointer-events: none;
  border-bottom: 2.5px dashed color-mix(in oklab, var(--ink) 30%, transparent);
  clip-path: inset(-4px 100% -4px 0);
  opacity: 0;
  transition: clip-path 1.3s cubic-bezier(.22,1,.36,1) .15s, opacity .4s ease .15s;
}
section.section-live::after {
  clip-path: inset(-4px 0 -4px 0);
  opacity: .5;
}
/* highlighter sweep across section headings */
.mh-hl {
  background-image: linear-gradient(100deg,
    color-mix(in oklab, var(--brand) 30%, transparent) 0%,
    color-mix(in oklab, var(--brand) 38%, transparent) 100%);
  background-repeat: no-repeat;
  background-size: 0% 44%;
  background-position: 0 76%;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  border-radius: 5px;
  padding: 0 .08em;
  margin: 0 -.08em;
  transition: background-size .95s cubic-bezier(.22,1,.36,1) .25s;
}
section.section-live .mh-hl {
  background-size: 100% 44%;
}
/* ── study-themed reveals ───────────────────────────────────
   flip  — flashcard lifting off the desk (3D, from face-down)
   deal  — dealt onto the table from the deck (right hand)
   deal-l— dealt from the left hand
   note  — sticky note slapped on, settling flat
   write — a line being written left → right
   page  — notebook page turning down from the top */
.motion-ready .motion-reveal {
  opacity: 0;
  will-change: transform, opacity, clip-path, filter;
}
.motion-ready .motion-reveal.motion-flip {
  transform: perspective(1200px) rotateX(-58deg) translateY(36px) scale(.96);
  transform-origin: 50% 92%;
  filter: brightness(1.07);
}
.motion-ready .motion-reveal.motion-deal {
  transform: translate(52px, 58px) rotate(7deg) scale(.93);
}
.motion-ready .motion-reveal.motion-deal-l {
  transform: translate(-52px, 58px) rotate(-7deg) scale(.93);
}
.motion-ready .motion-reveal.motion-note {
  transform: scale(1.15) rotate(-2.4deg);
  filter: drop-shadow(0 30px 26px color-mix(in oklab, var(--ink) 24%, transparent));
}
.motion-ready .motion-reveal.motion-write {
  transform: translateY(14px);
  clip-path: inset(-4% 103% -10% -3%);
}
.motion-ready .motion-reveal.motion-page {
  transform: perspective(1200px) rotateX(42deg) translateY(-14px);
  transform-origin: 50% -6%;
}
.motion-ready .motion-reveal.is-visible {
  opacity: 1;
  transform: none;
  filter: none;
  transition:
    opacity .6s cubic-bezier(.2,.8,.2,1),
    transform .78s cubic-bezier(.3,1.45,.45,1),
    filter .78s cubic-bezier(.2,.8,.2,1);
  transition-delay: var(--reveal-delay, 0ms);
}
.motion-ready .motion-reveal.motion-write.is-visible {
  clip-path: inset(-8% -8% -14% -6%);
  transition:
    opacity .35s cubic-bezier(.2,.8,.2,1),
    transform .7s cubic-bezier(.22,1,.36,1),
    clip-path .9s cubic-bezier(.6,.05,.3,1);
  transition-delay: var(--reveal-delay, 0ms);
}
.motion-hotspot {
  --motion-x: .5;
  --motion-y: .5;
  --motion-tilt-x: 0;
  --motion-tilt-y: 0;
  isolation: isolate;
}
.motion-hotspot::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  border-radius: inherit;
  opacity: 0;
  background:
    linear-gradient(
      115deg,
      transparent 0%,
      transparent calc((var(--motion-x) * 100%) - 24%),
      color-mix(in oklab, var(--brand) 20%, transparent) calc(var(--motion-x) * 100%),
      transparent calc((var(--motion-x) * 100%) + 24%),
      transparent 100%
    );
  transition: opacity .2s ease;
}
.motion-hotspot:hover::after {
  opacity: 0;
}
.motion-hotspot > * {
  position: relative;
  z-index: 1;
}
.btn {
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: "";
  position: absolute;
  inset: -20% -35%;
  transform: translateX(-110%) rotate(10deg);
  background: linear-gradient(90deg, transparent, color-mix(in oklab, white 50%, transparent), transparent);
  opacity: 0;
  pointer-events: none;
  transition: transform .6s cubic-bezier(.2,.8,.2,1), opacity .2s ease;
}
.btn:hover::after {
  transform: translateX(110%) rotate(10deg);
  opacity: .8;
}
.nav-links a {
  position: relative;
}
.nav-links a::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -8px;
  height: 2px;
  border-radius: 999px;
  background: var(--brand);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform .24s ease;
}
.nav-links a:hover::after {
  transform: scaleX(1);
}
.logo-mark {
  transition: transform .24s cubic-bezier(.2,.8,.2,1), filter .24s ease;
}
.logo:hover .logo-mark {
  transform: rotate(-8deg) scale(1.08);
  filter: drop-shadow(0 8px 12px color-mix(in oklab, var(--brand) 30%, transparent));
}
.eyebrow .dot,
.tag span:first-child {
  animation: motion-dot-breathe 1.9s ease-in-out infinite;
}
.feat-grid > div svg,
.how-grid svg,
.price-grid svg,
.quiz-wrap svg,
.canvas-cta svg {
  transition: transform .24s cubic-bezier(.2,.8,.2,1);
}
.feat-grid > div:hover svg,
.how-grid .card:hover svg,
.price-grid > div:hover svg,
.quiz-wrap .card:hover svg,
.canvas-cta:hover svg {
  transform: rotate(-7deg) scale(1.08);
}
.stats-grid > div,
.price-grid > div,
.feat-grid > div {
  transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
}
.stats-grid > div:hover {
  background: color-mix(in oklab, var(--brand) 8%, var(--surface));
}
.price-grid > div:hover,
.feat-grid > div:hover {
  filter: saturate(1.04);
}
.card:hover,
.card-soft:hover {
  box-shadow: 0 7px 0 0 var(--ink), 0 18px 34px rgba(15, 17, 27, .12);
}

[data-theme="dark"] .card,

[data-theme="dark"] .feat-grid > div,
[data-theme="dark"] .stats-grid > div,
[data-theme="dark"] .price-grid > div,

   MarkFinal({size, variant: 'flat'|'app'|'mono', ink, flick, uid})
   FinalWordmark({size, light, swoosh})
   Shared geometry exported as LOGO_PATHS so the build animation can construct it piece by piece. */

const LOGO_COLORS = {
  orange: "#FF7A3D", orangeDp: "#D64E16", amber: "#F2A156", core: "#FFE9C9",
  cream: "#FFF6E4", creamDim: "#F0DFC0", ink: "#2A2433",
  purple: "#5B4694", purpleDk: "#3A2A6E", purpleSh: "#4A3880",
};

const LOGO_PATHS = {
  squircle: "M50 3 C19 3 3 19 3 50 C3 81 19 97 50 97 C81 97 97 81 97 50 C97 19 81 3 50 3 Z",
  pageL: "M50 82 C41 73 29 70 16 72 L16 50 C29 48 41 51 50 58 Z",
  pageR: "M50 82 C59 73 71 70 84 72 L84 50 C71 48 59 51 50 58 Z",
  flameOut: "M50 14 C55 26 67 33 67 46 C67 57 59 64 50 64 C41 64 33 57 33 46 C33 33 45 26 50 14 Z",
  flameIn: "M50 33 C53 39 60 42 60 49 C60 55 55 59 50 59 C45 59 40 55 40 49 C40 42 47 39 50 33 Z",
  flameCore: "M50 45 C52 49 56 51 56 54 C56 57 53 59 50 59 C47 59 44 57 44 54 C44 51 48 49 50 45 Z",
  spine: "M50 58 L50 82",
};

function lgStar(cx, cy, r) {
  const i = r * 0.32;
  return `M${cx} ${cy - r} C${cx + i * 0.6} ${cy - i} ${cx + i} ${cy - i * 0.6} ${cx + r} ${cy} C${cx + i} ${cy + i * 0.6} ${cx + i * 0.6} ${cy + i} ${cx} ${cy + r} C${cx - i * 0.6} ${cy + i} ${cx - i} ${cy + i * 0.6} ${cx - r} ${cy} C${cx - i} ${cy - i * 0.6} ${cx - i * 0.6} ${cy - i} ${cx} ${cy - r} Z`;
}

function MarkFinal({ size = 100, variant = "flat", ink = LOGO_COLORS.ink, flick = 0, uid = "d" }) {
  const K = LOGO_COLORS, P = LOGO_PATHS;
  const isApp = variant === "app", isMono = variant === "mono";
  const pageLCol = isApp ? K.cream : isMono ? ink : K.purple;
  const pageRCol = isApp ? K.creamDim : isMono ? ink : K.purpleSh;
  const flame = isMono ? ink : K.orange;
  const gid = `lfg-${uid}`;
  const fs = 1 + flick;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style={{ display: "block", overflow: "visible" }}>
      {isApp && (
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0.3" y2="1">
            <stop offset="0" stopColor={K.purpleDk} />
            <stop offset="0.55" stopColor={K.purple} />
            <stop offset="1" stopColor={K.orange} />
          </linearGradient>
          <radialGradient id={gid + "-gl"} cx="0.5" cy="0.1" r="0.9">
            <stop offset="0" stopColor="#fff" stopOpacity="0.4" /><stop offset="0.6" stopColor="#fff" stopOpacity="0" />
          </radialGradient>
        </defs>
      )}
      {isApp && (
        <g>
          <path d={P.squircle} fill={`url(#${gid})`} />
          <path d={lgStar(23, 28, 4)} fill="#fff" opacity="0.9" />
          <path d={lgStar(79, 24, 5)} fill="#fff" opacity="0.85" />
          <circle cx="74" cy="44" r="1.8" fill="#fff" opacity="0.6" />
        </g>
      )}
      {/* flame (behind the book valley) */}
      <g transform={`translate(50 64) scale(${2 - fs} ${fs}) translate(-50 -64)`}>
        <path d={P.flameOut} fill={flame} />
        {!isMono && <path d={P.flameIn} fill={K.amber} />}
        {!isMono && <path d={P.flameCore} fill={K.core} />}
      </g>
      {/* open book */}
      <path d={P.pageL} fill={pageLCol} />
      <path d={P.pageR} fill={pageRCol} />
      {!isMono && <path d={P.spine} stroke={isApp ? "rgba(58,42,110,.35)" : "rgba(255,246,228,.45)"} strokeWidth="1.6" />}
      {isApp && <ellipse cx="50" cy="20" rx="54" ry="30" fill={`url(#${gid}-gl)`} />}
    </svg>
  );
}

function FinalWordmark({ size = 32, light = false, swoosh = true }) {
  const K = LOGO_COLORS;
  return (
    <div style={{ position: "relative", display: "inline-block", paddingBottom: swoosh ? size * 0.22 : 0 }}>
      <span style={{ fontFamily: "'Bricolage Grotesque', Georgia, serif", fontSize: size, fontWeight: 800, letterSpacing: "-0.045em", lineHeight: 1, whiteSpace: "nowrap" }}>

      </span>

        <svg viewBox="0 0 200 14" preserveAspectRatio="none" style={{ position: "absolute", left: "2%", bottom: 0, width: "96%", height: size * 0.3 }}>
          <path d="M2 11 Q70 2 150 6 Q180 7 198 2" fill="none" stroke={K.orange} strokeWidth="3.5" strokeLinecap="round" />
        </svg>
      )}
    </div>
  );
}

Object.assign(window, { LOGO_COLORS, LOGO_PATHS, MarkFinal, FinalWordmark });

    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
  <script type="text/babel">
/* MachReach JR — cinematic intro overlay (theme-aware).
   The logo builds itself: pages fly in, a spark drops, the flame ignites with an
   ember burst, the wordmark cascades, then the curtain lifts to reveal the page.
   Skippable: click, Esc/Enter/Space, or the "Saltar intro" button. */

const iClamp = (v, a, b) => Math.min(b, Math.max(a, v));
const iLerp = (a, b, p) => a + (b - a) * p;
const iRnd = (i, s = 0) => { const x = Math.sin(i * 127.1 + s * 311.7 + 13.37) * 43758.5453; return x - Math.floor(x); };
const iOutCubic = (p) => 1 - Math.pow(1 - p, 3);
const iOutBack = (p) => { const c = 1.70158; return 1 + (c + 1) * Math.pow(p - 1, 3) + c * Math.pow(p - 1, 2); };

function IntroEmbers({ n = 12, hot = false }) {
  return (
    <div aria-hidden="true" style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>
      {Array.from({ length: n }, (_, i) => {
        const sz = 3 + iRnd(i, 1) * 7;
        const dur = 4 + iRnd(i, 2) * 5;
        return <span key={i} className="mri-ember" style={{
          left: iRnd(i, 0) * 100 + "%", width: sz, height: sz,
          background: [LOGO_COLORS.orange, LOGO_COLORS.amber, "#F6C293"][Math.floor(iRnd(i, 4) * 3)],
          animationDuration: dur + "s", animationDelay: -iRnd(i, 3) * dur + "s",
          opacity: hot ? 0.8 : 0.35,
        }}></span>;
      })}
    </div>
  );
}

function IntroBurst({ n = 20 }) {
  return (
    <div aria-hidden="true" style={{ position: "absolute", left: "50%", top: "52%", width: 0, height: 0, pointerEvents: "none", zIndex: 5 }}>
      {Array.from({ length: n }, (_, i) => {
        const ang = iRnd(i, 2) * Math.PI * 2;
        const sp = 80 + iRnd(i, 3) * 170;
        const sz = 5 + iRnd(i, 4) * 8;
        return <span key={i} className="mri-burst-p" style={{
          width: sz, height: sz,
          background: [LOGO_COLORS.orange, LOGO_COLORS.amber, "#F6C293", LOGO_COLORS.orangeDp][Math.floor(iRnd(i, 6) * 4)],
          "--bx": Math.cos(ang) * sp + "px", "--by": (Math.sin(ang) * sp * 0.8 + 40) + "px",
        }}></span>;
      })}
    </div>
  );
}

function IntroOverlay({ onDone, enabled = true }) {
  const K = LOGO_COLORS, P = LOGO_PATHS;
  const DUR = 3.45, LIFT = 0.85;
  const [t, setT] = React.useState(0);
  const [gone, setGone] = React.useState(!enabled);
  const [lifting, setLifting] = React.useState(false);
  const doneRef = React.useRef(false);

  const finish = React.useCallback(() => {
    if (doneRef.current) return;
    doneRef.current = true;
    setLifting(true);
    onDone && onDone();
    setTimeout(() => setGone(true), LIFT * 1000 + 80);
  }, [onDone]);

  React.useEffect(() => {
    if (!enabled) { onDone && onDone(); return; }
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) { finish(); return; }
    let raf, t0 = performance.now();
    const tick = (now) => {
      const tt = (now - t0) / 1000;
      setT(tt);
      if (tt >= DUR) { finish(); return; }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    /* safety: if rAF is throttled (hidden tab/iframe), lift the curtain anyway */
    const safety = setTimeout(finish, (DUR + 1.2) * 1000);
    const onKey = (e) => { if (e.key === "Escape" || e.key === "Enter" || e.key === " ") finish(); };
    window.addEventListener("keydown", onKey);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); window.removeEventListener("keydown", onKey); };
  }, [enabled]);

  if (gone) return null;

  const T_PAGES = 0.35, T_SPARK = 1.0, T_HIT = 1.55, T_WORD = 1.9, T_TAG = 2.55;
  const pl = iOutBack(iClamp((t - T_PAGES) / 0.55, 0, 1));
  const pr = iOutBack(iClamp((t - T_PAGES - 0.14) / 0.55, 0, 1));
  const sparkP = iClamp((t - T_SPARK) / (T_HIT - T_SPARK), 0, 1);
  const sparkY = iLerp(-180, -36, sparkP * sparkP);
  const showSpark = t >= T_SPARK && t < T_HIT;
  const lit = t >= T_HIT;
  const flameIn = iOutBack(iClamp((t - T_HIT) / 0.55, 0, 1));
  const flash = lit ? Math.max(0, 0.45 * Math.exp(-(t - T_HIT) * 8)) : 0;
  const fs = 1 + (lit ? Math.sin(t * 9) * 0.05 : 0);
  const tagIn = iOutCubic(iClamp((t - T_TAG) / 0.5, 0, 1));

  return (
    <div className={"mri-intro" + (lifting ? " mri-lift" : "")} onClick={finish} role="button" aria-label="Saltar intro" data-screen-label="Intro cinemática">
      <div className="mri-bg" style={{ "--mri-glow": lit ? "16%" : "6%" }}></div>
      <IntroEmbers n={lit ? 14 : 5} hot={lit}></IntroEmbers>

      <div className="mri-stage">
        <div style={{ position: "relative", width: 168, height: 168, filter: lit ? "drop-shadow(0 0 26px rgba(255,122,61,.35))" : "none" }}>
          <svg width="168" height="168" viewBox="0 0 100 100" style={{ overflow: "visible", display: "block" }}>
            <g style={{ opacity: lit ? 1 : 0 }} transform={`translate(50 64) scale(${(2 - fs) * flameIn} ${fs * flameIn}) translate(-50 -64)`}>
              <path d={P.flameOut} fill={K.orange}></path>
              <path d={P.flameIn} fill={K.amber}></path>
              <path d={P.flameCore} fill={K.core}></path>
            </g>
            <g transform={`translate(${(1 - pl) * -46} ${(1 - pl) * 18}) rotate(${(1 - pl) * -22} 50 70)`} opacity={iClamp(pl * 1.4, 0, 1)}>
              <path d={P.pageL} fill={K.purple}></path>
            </g>
            <g transform={`translate(${(1 - pr) * 46} ${(1 - pr) * 18}) rotate(${(1 - pr) * 22} 50 70)`} opacity={iClamp(pr * 1.4, 0, 1)}>
              <path d={P.pageR} fill={K.purpleSh}></path>
            </g>
            {pl > 0.9 && <path d={P.spine} stroke="rgba(255,246,228,.45)" strokeWidth="1.6" opacity={iClamp((pl - 0.9) * 10, 0, 1)}></path>}
            {showSpark && (
              <g>
                <circle cx="50" cy={64 + sparkY} r="7" fill={K.core} opacity="0.9"></circle>
                <circle cx="50" cy={64 + sparkY} r="13" fill="rgba(255,170,90,.4)"></circle>
                <circle cx="50" cy={64 + sparkY - 12 * sparkP} r="3.5" fill={K.orange} opacity="0.6"></circle>
              </g>
            )}
          </svg>
          {lit && t < T_HIT + 1.2 && <IntroBurst></IntroBurst>}
        </div>

        <div style={{ marginTop: 18, whiteSpace: "nowrap" }} aria-label="MachReach JR">
          {"MachReach JR".split("").map((ch, i) => {
            const p = iOutBack(iClamp((t - T_WORD - i * 0.055) / 0.5, 0, 1));
            return (
              <span key={i} style={{
                display: "inline-block", fontFamily: "var(--font-display)", fontWeight: 800,
                fontSize: "clamp(44px, 8vw, 84px)", letterSpacing: "-0.04em", lineHeight: 1,
                color: i < 4 ? "var(--ink)" : "var(--brand)",
                opacity: iClamp(p, 0, 1), transform: `translateY(${(1 - p) * 46}px)`,
              }}>{ch}</span>
            );
          })}
        </div>
        <div style={{ marginTop: 16, fontFamily: "var(--font-body)", fontWeight: 700, fontSize: "clamp(15px,2.2vw,19px)", color: "var(--ink-2)", opacity: tagIn, transform: `translateY(${(1 - tagIn) * 16}px)` }}>
          El colegio deja de ser una lata.
        </div>
      </div>

      <div style={{ position: "absolute", inset: 0, background: LOGO_COLORS.core, opacity: flash, pointerEvents: "none" }}></div>

      <button className="mri-skip" onClick={(e) => { e.stopPropagation(); finish(); }}>Saltar intro →</button>
    </div>
  );
}

Object.assign(window, { IntroOverlay });

</script>

/* -------- STUDY PLAN CALLOUT (scroll-driven planner build) -------- */
function CanvasCallout() {
  // Weekly planner: subject blocks drop into a 7-day grid as the user scrolls,
  // then a "Tu plan está listo" badge appears. Recreated from MachReach JR Animación.
  const DAYS = ["L", "M", "M", "J", "V", "S", "D"];
  const PURPLE = "#5B4694", GREEN = "#1E9E72", BLUE = "#3B6FE0", ORANGE = "#F0922E", PINK = "#EC4899";
  // col 1-7, row 1-3, rowSpan, label, color — listed in drop order.
  const blocks = [
    { col: 1, row: 1, span: 2, t: "Matemática", c: PURPLE },
    { col: 3, row: 1, span: 1, t: "Inglés",     c: BLUE   },
    { col: 5, row: 1, span: 1, t: "Física",     c: PINK   },
    { col: 2, row: 2, span: 1, t: "Química",    c: GREEN  },
    { col: 4, row: 2, span: 2, t: "Matemática", c: PURPLE },
    { col: 3, row: 3, span: 1, t: "Historia",   c: ORANGE },
    { col: 6, row: 3, span: 1, t: "Química",    c: GREEN  },
    { col: 7, row: 1, span: 2, t: "Repaso",     c: ORANGE },
  ];

  const wrapRef = React.useRef(null);
  const [p, setP] = React.useState(0); // 0..1 scrub progress through the section
  // The planner is pinned (sticky) while the user scrolls through a tall wrapper,
  // so the plan BUILDS as you scroll down and UN-BUILDS as you scroll up — the
  // animation is scrubbed by scroll position. A rAF loop (IntersectionObserver-
  // gated for perf) maps scroll distance through the wrapper to progress; on short
  // layouts (mobile, where pinning is disabled) it falls back to a pass-through reveal.
  React.useEffect(() => {
    const wrap = wrapRef.current;
    if (!wrap) return;
    let raf = 0, active = false, last = -1;
    const measure = () => {
      raf = 0;
      const r = wrap.getBoundingClientRect();
      const vh = window.innerHeight || 800;
      const travel = wrap.offsetHeight - vh;
      let prog;
      if (travel > vh * 0.4) prog = (-r.top) / travel;             // pinned scrub
      else if (r.height) prog = (vh * 0.85 - r.top) / (vh * 0.55);  // mobile pass-through
      else prog = 0;
      prog = Math.max(0, Math.min(1, prog));
      const q = Math.round(prog * 100) / 100;
      if (q !== last) { last = q; setP(q); }
      if (active) raf = requestAnimationFrame(measure);
    };
    const io = new IntersectionObserver((ents) => {
      const vis = ents[0].isIntersecting;
      if (vis && !active) { active = true; if (!raf) raf = requestAnimationFrame(measure); }
      else if (!vis && active) { active = false; if (raf) { cancelAnimationFrame(raf); raf = 0; } measure(); }
    }, { threshold: 0 });
    io.observe(wrap);
    return () => { active = false; io.disconnect(); if (raf) cancelAnimationFrame(raf); };
  }, []);
  // Each block fades/slides in over its own slice of the scroll; badge at the end.
  const each = 0.8 / blocks.length;
  const blockProg = (i) => Math.max(0, Math.min(1, (p - i * each) / (each * 1.7)));
  const ready = p > 0.9;

  return (
    <section ref={wrapRef} className="plan-pin-wrap" style={{ position: "relative" }}>
      <div className="plan-pin">
      <div className="container" style={{ width: "100%" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", position: "relative" }}>
          {/* Heading on top — static, shown first (NOT part of the scroll animation) */}
          <p style={{
            textAlign: "center", margin: "0 0 24px", fontSize: "clamp(22px,3vw,32px)",
            fontWeight: 800, color: "var(--ink)", letterSpacing: "-.02em",
          }}>Te arma el plan de estudios perfecto.</p>

          {/* Weekly planner card — blocks drop in as you scroll */}
          <div style={{
            background: "#FFFFFF", borderRadius: 24, padding: "22px 24px 20px",
            border: "1px solid #ECE6D8", boxShadow: "0 24px 60px rgba(20,18,30,.12)",
          }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 9, marginBottom: 11 }}>
              {DAYS.map((d, i) => (
                <div key={i} style={{ textAlign: "center", fontSize: 12, fontWeight: 800, color: "#9A948A", letterSpacing: ".08em" }}>{d}</div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gridTemplateRows: "repeat(3, 64px)", gap: 9 }}>
              {Array.from({ length: 21 }).map((_, i) => (
                <div key={"c" + i} style={{ border: "1.5px dashed #E4DECF", borderRadius: 12 }}/>
              ))}
              {blocks.map((b, i) => {
                const bp = blockProg(i);
                return (
                  <div key={"b" + i} style={{
                    gridColumn: b.col, gridRow: b.row + " / span " + b.span,
                    background: b.c, color: "white", borderRadius: 12, padding: "10px 13px",
                    fontWeight: 800, fontSize: 13, lineHeight: 1.2,
                    display: "flex", alignItems: "flex-start",
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    boxShadow: "0 8px 18px rgba(0,0,0,.14)",
                    opacity: bp,
                    transform: "translateY(" + ((1 - bp) * -16) + "px) scale(" + (0.9 + bp * 0.1) + ")",
                  }}>{b.t}</div>
                );
              })}
            </div>
          </div>

          {/* "Tu plan está listo" badge below — pops in once the plan is built */}
          <div style={{ display: "flex", justifyContent: "center", marginTop: 24 }}>
            <div style={{
              transform: `translateY(${ready ? 0 : 10}px) scale(${ready ? 1 : 0.82})`,
              opacity: ready ? 1 : 0,
              transition: "opacity .4s ease, transform .5s cubic-bezier(.34,1.56,.64,1)",
              background: GREEN, color: "white", fontWeight: 800, fontSize: 15,
              padding: "11px 22px", borderRadius: 999, whiteSpace: "nowrap",
              boxShadow: "0 12px 28px rgba(30,158,114,.4)",
            }}>✓ Tu plan está listo</div>
          </div>
        </div>
      </div>
      </div>
      <style>{`
        .plan-pin-wrap { height: 180vh; }
        .plan-pin { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; }
        @media (max-width: 900px) {
          .plan-pin-wrap { height: auto; }
          .plan-pin { position: static; height: auto; display: block; padding: 64px 0; }
        }
      `}</style>
    </section>
  );
}

function QuizDemo() {
  const questions = [
    { q: "¿Cuál es la unidad básica de la vida?", opts: ["El átomo", "La célula", "El tejido", "La molécula"], correct: 1, ramo: "Biología" },
    { q: "¿En qué año se independizó Chile?", opts: ["1810", "1818", "1820", "1833"], correct: 1, ramo: "Historia" },
    { q: "¿Cuánto es 15% de 200?", opts: ["15", "20", "30", "45"], correct: 2, ramo: "Matemática" },
  ];
  const [i, setI] = React.useState(0);
  const [picked, setPicked] = React.useState(null);
  const q = questions[i];

  const choose = (k) => {
    if (picked !== null) return;
    setPicked(k);
  };
  const next = () => {
    setPicked(null);
    setI((i + 1) % questions.length);
  };

  return (
    <section>
      <div className="container">
        <div className="section-head">
          <span className="eyebrow"><span className="dot"/> Quizzes</span>
          <h2>Quizzes con IA, desde el<br/>material de cada profe.</h2>

        </div>
        <div className="quiz-wrap" style={{ display: "grid", gridTemplateColumns: "1fr 1.1fr", gap: 36, alignItems: "center" }}>
          <div>
            <h3 style={{ fontSize: 26, marginBottom: 14 }}>Material desordenado entra. Quiz ordenado sale.</h3>
            <p style={{ color: "var(--ink-2)", fontSize: 16, marginBottom: 22 }}>
              El profe sube un PDF y la IA genera preguntas relevantes para la próxima prueba en segundos.
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {[
                { ic: <IconBook/>,   t: "Quizzes del material real del curso, no de internet" },
                { ic: <IconPeople/>, t: "Material y datos dentro de la cuenta del colegio" },
                { ic: <IconCoin/>,   t: "El progreso real viene del Focus, no de farmear quizzes" },
              ].map((r, k) => (
                <div key={k} style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{
                    width: 40, height: 40, borderRadius: 12,
                    background: "var(--secondary-soft)", border: "2px solid var(--secondary)",
                    color: "var(--secondary)", display: "grid", placeItems: "center",
                  }}>{React.cloneElement(r.ic, { size: 20 })}</div>
                  <span style={{ fontWeight: 600 }}>{r.t}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{ padding: 0, overflow: "hidden" }}>
            {/* Quiz top bar */}
            <div className="quiz-top-bar" style={{
              padding: "14px 20px",
              background: "var(--ink)", color: "white",
              display: "grid", gridTemplateColumns: "auto 1fr", alignItems: "center", gap: 14,
            }}>
              <span style={{
                fontFamily: "var(--font-mono)", fontSize: 11, fontWeight: 700,
                background: "var(--brand)", padding: "4px 10px", borderRadius: 6,
                letterSpacing: ".06em",
              }}>{q.ramo}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {/* progress bar */}
                <div style={{ flex: 1, height: 8, background: "color-mix(in oklab, white 14%, transparent)", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ width: ((i + 1) / questions.length) * 100 + "%", height: "100%", background: "var(--accent)", transition: "width .3s ease" }}/>
                </div>
                <span className="quiz-counter" style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "color-mix(in oklab, white 70%, transparent)" }}>{i + 1}/{questions.length}</span>
              </div>
            </div>

            <div style={{ padding: 26 }}>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 24, marginBottom: 20, lineHeight: 1.25 }}>{q.q}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {q.opts.map((o, k) => {
                  const isPicked = picked === k;
                  const isCorrect = k === q.correct;
                  let bg = "var(--surface)", bd = "var(--line-2)", color = "var(--ink)", shadow = "0 2px 0 0 var(--line-2)";
                  if (picked !== null) {
                    if (isCorrect) { bg = "color-mix(in oklab, var(--good) 18%, var(--surface))"; bd = "var(--good)"; shadow = "0 2px 0 0 var(--good)"; }
                    else if (isPicked) { bg = "color-mix(in oklab, var(--bad) 14%, var(--surface))"; bd = "var(--bad)"; shadow = "0 2px 0 0 var(--bad)"; }
                  }
                  return (
                    <button key={k} onClick={() => choose(k)} style={{
                      padding: "14px 18px", borderRadius: 14,
                      border: "2px solid " + bd, background: bg, color,
                      boxShadow: shadow,
                      textAlign: "left", fontWeight: 700, fontSize: 16,
                      display: "grid", gridTemplateColumns: "28px 1fr auto", alignItems: "center", gap: 12,
                      cursor: picked === null ? "pointer" : "default",
                      transition: "all .2s ease",
                    }}>
                      <span style={{
                        fontFamily: "var(--font-mono)", fontSize: 12,
                        width: 28, height: 28, borderRadius: 8,
                        background: picked !== null && isCorrect ? "var(--good)" : picked !== null && isPicked ? "var(--bad)" : "var(--bg-2)",
                        color: (picked !== null && (isCorrect || isPicked)) ? "white" : "var(--ink-2)",
                        border: "2px solid var(--ink)",
                        display: "grid", placeItems: "center", fontWeight: 800,
                      }}>{["A","B","C","D"][k]}</span>
                      <span>{o}</span>
                      {picked !== null && isCorrect && <IconCheck size={20} color="var(--good)" strokeWidth={3}/>}
                      {picked !== null && isPicked && !isCorrect && <IconClose size={20} color="var(--bad)" strokeWidth={3}/>}
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20, paddingTop: 16, borderTop: "2px dashed var(--line)" }}>
                <span style={{ fontSize: 13, color: picked === null ? "var(--ink-3)" : picked === q.correct ? "var(--good)" : "var(--bad)", fontFamily: "var(--font-mono)", fontWeight: 700 }}>
                  {picked === null ? "Elige una respuesta" : picked === q.correct ? "✓ Correcto" : "Revisa la respuesta correcta"}
                </span>
                <button onClick={next} className="btn btn-ghost btn-sm">
                  Siguiente <IconArrow size={14}/>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <style>{`@media (max-width: 880px) { .quiz-wrap { grid-template-columns: 1fr !important; } }`}</style>
    </section>
  );
}

/* -------- STATS STRIP -------- */
function useCountUp(target, active) {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    if (!active) return;
    let start = null;
    const dur = 1400;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(Math.floor(target * eased));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, active]);
  return v;
}
function StatsStrip() {
  const ref = React.useRef(null);
  const [active, setActive] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver((es) => es.forEach(e => e.isIntersecting && setActive(true)), { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  const stats = [
    { v: useCountUp(2347, active), l: "escolares activos esta semana", suf: "" },
    { v: useCountUp(184,  active), l: "horas estudiadas hoy", suf: "h" },
    { v: useCountUp(12,   active), l: "colegios conectados", suf: "" },
    { v: useCountUp(98,   active), l: "de colegios lo recomienda", suf: "%" },
  ];
  return (
    <section ref={ref} style={{ paddingTop: 64, paddingBottom: 64 }}>
      <div className="container">
        <div className="stats-grid" style={{
          display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 0,
          background: "var(--surface)", border: "2px solid var(--ink)", borderRadius: 24,
          boxShadow: "0 6px 0 0 var(--ink)", overflow: "visible", marginBottom: 10,
        }}>
          {stats.map((s, i) => (
            <div key={i} style={{
              padding: "32px 24px", textAlign: "center",
              borderRight: i < stats.length - 1 ? "2px solid var(--line)" : "none",
            }}>

function LandingMotion() {
  React.useEffect(() => {
    const root = document.documentElement;
    root.classList.add("motion-ready");

    const progress = document.getElementById("landing-progress-bar");
    const updateProgress = () => {
      if (!progress) return;
      const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      const pct = Math.min(1, Math.max(0, window.scrollY / max));
      progress.style.transform = `scaleX(${pct})`;
      root.style.setProperty("--landing-scroll-pct", `${(pct * 100).toFixed(2)}%`);
    };

    const revealVariants = [
      "motion-flip",
      "motion-deal",
      "motion-note",
      "motion-page",
      "motion-deal-l",
    ];
    const revealSelectors = [
      ".hero-grid > *",
      "section .section-head",
      ".stats-grid > *",
      ".feat-grid > *",
      ".how-grid > *",
      ".canvas-cta",
      ".lb-wrap > *",
      ".quiz-wrap > *",
      ".price-grid > *",
      ".faq-list > *",
      ".foot-grid > *",
      "footer .container > div:last-child",
    ].join(",");
    const revealTargets = Array.from(document.querySelectorAll(revealSelectors));
    revealTargets.forEach((el, i) => {
      /* section heads are "written" onto the page; everything else gets dealt/flipped/slapped like study material */
      const variant = el.classList.contains("section-head") ? "motion-write" : revealVariants[i % revealVariants.length];
      el.classList.add("motion-reveal", variant);
      el.style.setProperty("--motion-order", i);
      el.style.setProperty("--reveal-delay", `${(i % 6) * 70}ms`);
    });

    /* highlighter sweep: wrap heading text so the marker hugs each line */
    try {
      document.querySelectorAll("section .section-head h2").forEach((h) => {
        if (!h.querySelector(".mh-hl")) h.innerHTML = '<span class="mh-hl">' + h.innerHTML + "</span>";
      });
    } catch (e) { /* non-fatal */ }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.16, rootMargin: "0px 0px -8% 0px" });
    revealTargets.forEach(el => observer.observe(el));
    const markVisible = () => {
      revealTargets.forEach((el) => {
        if (el.classList.contains("is-visible")) return;
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.94 && rect.bottom > -window.innerHeight * 0.12) {
          el.classList.add("is-visible");
        }
      });
    };

    const hotSelectors = [
      ".card",
      ".card-soft",
      ".btn",
      ".feat-grid > div",
      ".stats-grid > div",
      ".price-grid > div",
      ".canvas-cta",
      ".lb-arena",
      ".lb-insight",
    ].join(",");
    const hotTargets = Array.from(document.querySelectorAll(hotSelectors));
    const onMove = (event) => {
      const el = event.currentTarget;
      const rect = el.getBoundingClientRect();
      const x = (event.clientX - rect.left) / Math.max(1, rect.width);
      const y = (event.clientY - rect.top) / Math.max(1, rect.height);
      el.style.setProperty("--motion-x", x.toFixed(3));
      el.style.setProperty("--motion-y", y.toFixed(3));
      el.style.setProperty("--motion-tilt-x", ((x - 0.5) * 5).toFixed(3));
      el.style.setProperty("--motion-tilt-y", ((y - 0.5) * 5).toFixed(3));
    };
    const onLeave = (event) => {
      const el = event.currentTarget;
      el.style.setProperty("--motion-x", "0.5");
      el.style.setProperty("--motion-y", "0.5");
      el.style.setProperty("--motion-tilt-x", "0");
      el.style.setProperty("--motion-tilt-y", "0");
    };
    hotTargets.forEach((el) => {
      el.classList.add("motion-hotspot");
      el.style.setProperty("--motion-x", "0.5");
      el.style.setProperty("--motion-y", "0.5");
      el.style.setProperty("--motion-tilt-x", "0");
      el.style.setProperty("--motion-tilt-y", "0");
      el.addEventListener("mousemove", onMove);
      el.addEventListener("mouseleave", onLeave);
    });

    const onPointer = (event) => {
      const x = Math.min(1, Math.max(0, event.clientX / Math.max(1, window.innerWidth)));
      const y = Math.min(1, Math.max(0, event.clientY / Math.max(1, window.innerHeight)));
      root.style.setProperty("--landing-mx", x.toFixed(3));
      root.style.setProperty("--landing-my", y.toFixed(3));
      root.style.setProperty("--landing-dx", `${((x - 0.5) * 18).toFixed(2)}px`);
      root.style.setProperty("--landing-dy", `${((y - 0.5) * 18).toFixed(2)}px`);
    };

    const sections = Array.from(document.querySelectorAll("section"));

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        entry.target.classList.toggle("section-live", entry.isIntersecting);
      });
    }, { threshold: 0.12, rootMargin: "-8% 0px -14% 0px" });
    sections.forEach((section, i) => {
      section.style.setProperty("--section-order", i);
      sectionObserver.observe(section);
    });
    const markLiveSections = () => {
      const vh = Math.max(1, window.innerHeight);
      sections.forEach((section) => {
        const rect = section.getBoundingClientRect();
        const live = rect.top < vh * 0.82 && rect.bottom > vh * 0.18;
        section.classList.toggle("section-live", live);
      });
    };

    updateProgress();
    requestAnimationFrame(markVisible);
    requestAnimationFrame(markLiveSections);
    setTimeout(markVisible, 320);
    setTimeout(markLiveSections, 360);
    window.addEventListener("scroll", updateProgress, { passive: true });
    window.addEventListener("scroll", markVisible, { passive: true });
    window.addEventListener("scroll", markLiveSections, { passive: true });
    window.addEventListener("resize", updateProgress);
    window.addEventListener("resize", markVisible);
    window.addEventListener("resize", markLiveSections);
    window.addEventListener("pointermove", onPointer, { passive: true });

    return () => {
      window.removeEventListener("scroll", updateProgress);
      window.removeEventListener("scroll", markVisible);
      window.removeEventListener("scroll", markLiveSections);
      window.removeEventListener("resize", updateProgress);
      window.removeEventListener("resize", markVisible);
      window.removeEventListener("resize", markLiveSections);
      window.removeEventListener("pointermove", onPointer);
      hotTargets.forEach((el) => {
        el.removeEventListener("mousemove", onMove);
        el.removeEventListener("mouseleave", onLeave);
      });
      observer.disconnect();
      sectionObserver.disconnect();
    };
  }, []);

  return (
    <>
      <div id="landing-progress" aria-hidden="true">
        <span id="landing-progress-bar"/>
        <span id="landing-progress-flame">
          <svg viewBox="0 0 100 125" width="22" height="22" style={{ display: "block", overflow: "visible" }}>
            <path d="M50 0 C62 28 92 44 92 76 C92 103 73 122 50 122 C27 122 8 103 8 76 C8 44 38 28 50 0 Z" fill="#FF7A3D"/>
            <path d="M50 45 C57 60 74 68 74 86 C74 102 63 112 50 112 C37 112 26 102 26 86 C26 68 43 60 50 45 Z" fill="#F2A156"/>
            <path d="M50 72 C54 80 62 84 62 93 C62 102 56 107 50 107 C44 107 38 102 38 93 C38 84 46 80 50 72 Z" fill="#FFE9C9"/>
          </svg>
        </span>
      </div>
      <div className="landing-edge-pattern" aria-hidden="true"/>
    </>
  );
}

                <IconBolt size={14}/> Agenda una demo
              </a>
            </div>
          </div>
        </nav>
      );
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [introKey, setIntroKey] = React.useState(1);

      React.useEffect(() => {
        document.documentElement.dataset.theme = tweaks.theme || "light";
        document.documentElement.dataset.accent = tweaks.accent || "coral";
      }, [tweaks.theme, tweaks.accent]);

      const introDone = React.useCallback(() => {
        document.body.dataset.intro = "done";
      }, []);

      const replayIntro = () => {
        window.scrollTo({ top: 0, behavior: "auto" });
        document.body.dataset.intro = "pending";
        setIntroKey((k) => k + 1);
      };

      return (
        <>
          <IntroOverlay key={introKey} enabled={!!tweaks.playIntro} onDone={introDone}/>
          <Nav tweaks={tweaks} setTweak={setTweak}/>
          <LandingMotion/>
          <Hero/>
          <StatsStrip/>
          <Features/>
          <HowItWorks/>
          <CanvasCallout/>
          <LeaderboardShowcase/>
          <QuizDemo/>
          <Pricing/>
          <div id="faq"><FAQ/></div>
          <FinalCTA/>
          <Footer/>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Tema">
              <TweakRadio
                label="Modo"
                value={tweaks.theme}
                onChange={(v) => setTweak("theme", v)}
                options={[
                  { value: "light", label: "Claro" },
                  { value: "dark",  label: "Oscuro" },
                ]}
              />
              <TweakRadio
                label="Color de acento"
                value={tweaks.accent}
                onChange={(v) => setTweak("accent", v)}
                options={[
                  { value: "coral",  label: "Coral" },
                  { value: "lime",   label: "Lima" },
                  { value: "violet", label: "Violeta" },
                  { value: "sky",    label: "Cielo" },
                ]}
              />
            </TweakSection>
            <TweakSection label="Intro">
              <TweakToggle
                label="Intro al cargar"
                value={!!tweaks.playIntro}
                onChange={(v) => setTweak("playIntro", v)}
              />
              <TweakButton label="↺ Reproducir intro" onClick={replayIntro}/>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
